name: Zadanie 2 - CI/CD

on:
  workflow_dispatch:
  push:
    branches: [ "main", "master" ]
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ "main", "master" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  REGISTRY_GHCR: ghcr.io
  REGISTRY_DOCKERHUB: docker.io
  IMAGE_NAME_GHCR: ${{ github.repository_owner }}/zadanie2-app
  IMAGE_NAME_DOCKERHUB: ${{ secrets.DOCKERHUB_USERNAME }}/zadanie2-cache

jobs:
  build-and-secure:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: QEMU Set up
        uses: docker/setup-qemu-action@v3

      - name: Buildx Set up
        uses: docker/setup-buildx-action@v3

      - name: Zaloguj do ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_GHCR }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Zaloguj do Dockerhuba
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_DOCKERHUB }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata for GHCR
        id: meta-ghcr
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME_GHCR }}
          tags: |
            type=semver,pattern={{version}}
            type=sha,format=short,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}

      - name: Zbuduj lokalnie obraz do skanu
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true 
          tags: local-scan-target:latest
          cache-from: type=registry,ref=${{ env.REGISTRY_DOCKERHUB }}/${{ env.IMAGE_NAME_DOCKERHUB }}:cache

      - name: Skanowanie obrazu Trivy
        id: trivy-scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'local-scan-target:latest'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'HIGH,CRITICAL'

      - name: Jesli wykryto bledy, wyswietl informacje i przerwij
        if: failure() && steps.trivy-scan.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            core.setFailed('Wykryto podatnosci HIGH lub CRITICAL');

      - name: Zbuduj i wypchnij GHCR
        if: success()
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-ghcr.outputs.tags }}
          labels: ${{ steps.meta-ghcr.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY_DOCKERHUB }}/${{ env.IMAGE_NAME_DOCKERHUB }}:cache
          cache-to: type=registry,ref=${{ env.REGISTRY_DOCKERHUB }}/${{ env.IMAGE_NAME_DOCKERHUB }}:cache,mode=max